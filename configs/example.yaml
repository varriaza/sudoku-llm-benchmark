model:
  api_base: "http://localhost:11434/v1"
  name: "llama3:70b-q4_K_M"   # optional — auto-detected if omitted
  # context_window: 32768       # set manually if backend doesn't report it

puzzles:
  - box_rows: 2
    box_cols: 2
    diffs: [0.25, 0.5, 0.75]
    tests_per_diff: 3
  - box_rows: 2
    box_cols: 3
    diffs: [0.25, 0.5, 0.75]
    tests_per_diff: 3
  - box_rows: 3
    box_cols: 3
    diffs: [0.25, 0.5, 0.75]
    tests_per_diff: 5
  - box_rows: 3
    box_cols: 4
    diffs: [0.25, 0.5, 0.75]
    tests_per_diff: 3
  - box_rows: 4
    box_cols: 4
    diffs: [0.25, 0.5, 0.75]
    tests_per_diff: 3

benchmark:
  gpu_poll_interval: 1.0          # seconds between nvidia-smi polls
  results_file: "results/benchmark.csv"
  puzzle_bank_file: "puzzles/puzzles.json"
  context_buffer_tokens: 500      # reserve this many tokens before context is "full"
  max_turns_per_puzzle: 200       # hard cap on turns per puzzle (safety net)
